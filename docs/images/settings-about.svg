  <text x="34" y="890" class="ui t b" font-size="22">macOS Clock</text><text x="34" y="918" class="ui s sb" font-size="13">macOS does not provide a public API for hiding the built-in menu bar clock. Open</text><text x="34" y="936" class="ui s sb" font-size="13">System Settings and hide it manually if the option is available on this Tahoe build.</text><rect x="32" y="979" width="210" height="30" rx="5" fill="#3a3a3a"/><text x="76" y="998" class="ui t sb" font-size="14">Open Clock Settings</text><rect x="250" y="986" width="16" height="16" rx="4" fill="#777"/><text x="274" y="999" class="ui t sb" font-size="14">Add to login items</text>
